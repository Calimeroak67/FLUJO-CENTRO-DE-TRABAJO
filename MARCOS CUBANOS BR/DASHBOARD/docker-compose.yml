services:
  dashboard:
    build: .
    container_name: pcbr-dashboard
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      DASHBOARD_ANO: ${DASHBOARD_ANO:-2026}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
